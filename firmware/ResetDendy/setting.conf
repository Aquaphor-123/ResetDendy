/*
Всем привет.
Данная программа была написана под микроконтроллер ATTiny10 (4, 5, 9).
Программа выполняет сброс Dendy при помощи комбинации кнопок на джойстике.
Для работы программы необходимо перевести вывод PB3 в режим I/O, для этого нужно запрограммировать Fuse bit RSTDISBL.
Программа проверена на приставке с NTSC-чипами, с PAL-чипами не тестировалась.


Программа по умолчанию для приставок, где сброс осуществляется кнопкой, притягивающей вывод RES микросхемы PPU к земле питания. 
Если у Вас NES с CIC (3193a) чипом, то сброс осуществляется кнопкой, притягивающей вывод 7 CIC к плюсу питания. Я не тестировал данный режим, но если вы считаете? что понимаете, 
что делаете, то расскоментируйте строку ниже и пробуйте на NES с CIC. 

Hi all.
This program was written for ATTiny10 (4, 5, 9) microcontroller.
The program resets Dendy by pressing a joystick button combination.
To make it work, you need to switch PB3 pin to I/O mode by programming the RSTDISBL Fuse bit.
The program was tested on NTSC consoles, not tested on PAL consoles.


The program is designed for consoles where reset is done by a button pulling the PPU RES pin to GND.
If you have an NES with CIC (3193a) chip, reset is done by a button pulling CIC pin 7 to VCC.
I haven't tested this mode, but if you think you understand what you're doing,
uncomment the line below and try it on NES with CIC.
*/  

//.equ	NES	=	1

// Если хотите посмотреть в симуляторе МК, раскомментируйте строку ниже.
// Это ускорит прохождение чтения данных и отключит задержку сброса.
// If you want to test in the MCU simulator, uncomment the line below.
// This will speed up data reading and disable reset delay.

//.equ	SIMULATOR	=	1

// Выбор микроконтроллера:
// Microcontroller selection:

.equ	ATtiny10	=	1
//.equ	ATtiny9	=	1
//.equ	ATtiny5	=	1
//.equ	ATtiny4	=	1

// Если вы используете беспроводной геймпад 8BitDo N30, раскомментируйте строку ниже, чтобы использовать кнопку Home для сброса Dendy. 
// If you use 8BitDo N30 wireless gamepad, uncomment the line below to use the Home button for reset.

//.equ	J_8BitDo_N30	=	1

/*
Ниже задаём комбинацию кнопок джойстика для сброса Dendy (проверено только START & SELECT). 
Игнорируется если включён сброс кнопкой Home геймпада 8BitDo N30.
Below we set the joystick button combination for Dendy reset (tested only with START & SELECT).
Ignored if reset by 8BitDo N30 Home button is enabled.

Кнопки (Buttons): RIGHT, LEFT, DOWN, UP, START, SELECT, B, A.
Пример (Example):
1. START & SELECT
2. START & SELECT & B
3. START & SELECT & UP
*/

.set	BUTTON_MASK = START & SELECT

/*
Ниже можно указать желаемое количество считываний комбинации кнопок до перехода к сбросу.
Можно добиться предотвращения ошибочных нажатий.
Below you can set the desired number of button combination reads before reset.
Helps to prevent accidental presses.
*/
.set	REPEAT = 10	//255 макс

// Сколько секунд ждать восстановления работы приставки до повторной перезагрузки.
// Избавляет от проблемы зависания приставки при нажатии кнопки сброса.
// How many seconds to wait for the console to recover before another reset.
// Prevents console freezing when pressing the reset button.

.set	REPTIME = 5	//255 макс

// Параметры разгона частоты
// Overclocking parameters

.equ	stepOverClock = 4
.equ	stepOSCCAL = 20
.equ	delayStabil = 50
